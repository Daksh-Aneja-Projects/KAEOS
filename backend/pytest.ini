[pytest]
asyncio_mode = auto
# MUST match the test loop scope (function, the pytest-asyncio default).
# With `session` here, the async `client` fixture is bound to the session
# loop while each test runs on its own function-scoped loop - the fixture's
# teardown then executes after that loop is closed and every test errors
# with "RuntimeError: Event loop is closed" AT TEARDOWN. All tests pass,
# yet pytest exits 1: 401 passed / 404 errors in CI. The e2e client fixture
# is function-scoped anyway, so a function-scoped loop is the correct pairing.
asyncio_default_fixture_loop_scope = function
markers =
    ollama: needs a real local model (deselected in the fake-LLM CI lane)
