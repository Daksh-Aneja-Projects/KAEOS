version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kaeos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set for production}
      POSTGRES_DB: ${POSTGRES_DB:-kaeos_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaeos_admin -d kaeos_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: /app/start-prod.sh
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-kaeos_admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set for production}@db:5432/${POSTGRES_DB:-kaeos_prod}
      - ENVIRONMENT=production
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
