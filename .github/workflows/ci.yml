name: KAEOS Enterprise CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.12
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"
    - name: Install ruff
      run: pip install ruff==0.15.8
    - name: Ruff (bug-catching rules — see backend/ruff.toml)
      run: |
        cd backend
        ruff check .

  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.12
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run unit tests
      env:
        SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
        DEV_MODE: "true"
        ENVIRONMENT: "ci"
      run: |
        cd backend
        # The e2e suite needs a live backend on :8001 plus a local Ollama, so it
        # cannot run here — it skips itself via the `client` fixture rather than
        # failing, which would make CI green while testing nothing. Run it
        # against a real stack: see README "E2E Test Suite".
        pytest tests/ --ignore=tests/e2e

  backend-e2e-mock:
    # Gate/pipeline logic against a LIVE backend with a deterministic fake
    # LLM (KAEOS_FAKE_LLM=1) - no Ollama, no cloud keys. Runs against real
    # PostgreSQL + pgvector + Redis (the production data stack) so dialect-only
    # bugs are caught in CI - e.g. NUMERIC-returns-Decimal issues that SQLite
    # silently tolerates. The full-fidelity e2e run with a real local model
    # stays a pre-release manual step (see README "E2E Test Suite").
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kaeos
          POSTGRES_PASSWORD: kaeos_ci
          POSTGRES_DB: kaeos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaeos"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 3s --health-retries 5
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.12
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Boot backend + seed + run non-Ollama e2e (on Postgres+pgvector)
      env:
        SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
        ADMIN_SECRET: "ci-admin-secret-do-not-use-in-production"
        DEV_MODE: "true"
        ENVIRONMENT: "ci"
        KAEOS_FAKE_LLM: "1"
        # App connects as the non-owner kaeos_app role (created by init_db via the
        # owner URL) so RLS actually applies - the same posture as production.
        DATABASE_URL: "postgresql+asyncpg://kaeos_app:kaeos_app_ci@localhost:5432/kaeos"
        DATABASE_URL_SYNC: "postgresql+psycopg2://kaeos:kaeos_ci@localhost:5432/kaeos"
        KAEOS_OWNER_DB_URL: "postgresql+asyncpg://kaeos:kaeos_ci@localhost:5432/kaeos"
        KAEOS_APP_DB_PASSWORD: "kaeos_app_ci"
        REDIS_URL: "redis://localhost:6379/0"
      run: |
        cd backend
        python -m uvicorn app.main:app --port 8001 --log-level warning &
        for i in $(seq 1 30); do
          curl -sf http://localhost:8001/health > /dev/null && break
          sleep 2
        done
        python scripts/seed_master.py
        python -m scripts.check_migration_drift
        pytest tests/e2e -m "not ollama" -q --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Node.js 20
      uses: actions/setup-node@v7
      with:
        node-version: "20"
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Lint and Build
      run: |
        cd frontend
        npm run lint
        npm run build

  security-scan:
    # Dependency + static-analysis security scanning. NON-BLOCKING for now:
    # every step has continue-on-error so findings are reported without failing
    # the build while the backlog is worked down. Once the backlog is clean,
    # remove the continue-on-error flags (or gate on them) to make this blocking.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.12
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"
    - name: Install scanners
      run: pip install pip-audit bandit
    - name: pip-audit (known CVEs in backend dependencies)
      continue-on-error: true
      run: |
        cd backend
        pip-audit -r requirements.txt
    - name: bandit (Python static analysis, medium+ severity)
      continue-on-error: true
      run: |
        cd backend
        bandit -r app -ll
    - name: Set up Node.js 20
      uses: actions/setup-node@v7
      with:
        node-version: "20"
    - name: npm audit (frontend dependencies, high+ severity)
      continue-on-error: true
      run: |
        cd frontend
        npm audit --audit-level=high
