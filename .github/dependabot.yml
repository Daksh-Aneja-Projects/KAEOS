# Dependabot configuration for KAEOS.
# Applies to both version updates AND security updates (ignore rules below
# suppress un-installable bumps in either mode). Grouped + weekly so the repo
# gets a small, mergeable set of PRs instead of a flood.
version: 2
updates:
  # ---- Backend (pip) --------------------------------------------------------
  # SECURITY-ONLY. The backend stack is hand-pinned with per-line justifications
  # (see backend/requirements.txt); wholesale weekly version bumps fight those
  # pins and produce a perpetually-failing 30+ package group PR. open-pull-
  # requests-limit: 0 disables *version* updates while keeping *security* updates
  # (which need no PR budget) — and the ignore rules below still apply to them,
  # so the un-installable Starlette 1.x security bump stays suppressed.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    ignore:
      # Starlette 1.x is intentionally pinned OUT. No released FastAPI supports
      # it (0.119.x caps starlette <0.49.0), and Starlette 1.x reworks
      # include_router into an _IncludedRouter mount with no `.path`, which
      # breaks every require_role-gated route (500s + RBAC introspection
      # failures). Dependabot kept proposing the un-installable 0.38→1.3.1
      # security bump (GHSA-82w8); this stops it. Revisit — and delete this
      # ignore — once FastAPI ships support for the Starlette 1.x line.
      # See SECURITY.md "Accepted / tracked advisories" and CHANGELOG 1.1.1.
      # NOTE: Dependabot security updates will still trigger and report
      # "all_versions_ignored" — that is expected and harmless; the error
      # means the only patched versions (>=1.x) are blocked by this rule.
      - dependency-name: "starlette"
        versions: [">=1.0.0"]
  # ---- Frontend (npm) -------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # typescript-eslint 8.x (latest) requires typescript >=4.8.4 <6.1.0.
      # Dependabot bumped typescript to 7.x which breaks npm ci with an
      # ERESOLVE peer-dep conflict. Block TS >= 6.1.0 until typescript-eslint
      # ships a version that supports the TypeScript 7.x line.
      - dependency-name: "typescript"
        versions: [">= 6.1.0"]
    groups:
      frontend-npm:
        patterns:
          - "*"
  # ---- CI workflows (github-actions) ---------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      ci-actions:
        patterns:
          - "*"
